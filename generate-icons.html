<!DOCTYPE html>
<html>
<head>
  <title>StockPulse — Icon Generator</title>
  <style>
    body { font-family:system-ui,sans-serif; background:#0d1117; color:#e2e8f0;
           display:flex; flex-direction:column; align-items:center; padding:48px 24px; gap:32px; }
    h2   { margin:0; font-size:22px; font-weight:800; letter-spacing:-0.4px; }
    p    { margin:0; font-size:13px; color:#7985a0; }
    .row { display:flex; gap:36px; align-items:flex-end; flex-wrap:wrap; justify-content:center; }
    .box { display:flex; flex-direction:column; align-items:center; gap:10px; font-size:12px; color:#7985a0; }
    canvas { display:block; }
    .btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
    a { background:#6366f1; color:#fff; padding:11px 26px; border-radius:9px;
        text-decoration:none; font-weight:700; font-size:14px; letter-spacing:0.01em; }
    a:hover { background:#4f46e5; }
  </style>
</head>
<body>
  <h2>StockPulse Icon Generator</h2>
  <p>Open in any browser → click Download → replace icon-512.png and icon-192.png in your repo</p>

  <div class="row">
    <div class="box">
      <canvas id="c512" width="512" height="512" style="border-radius:113px;box-shadow:0 12px 48px rgba(79,70,229,0.5)"></canvas>
      512 × 512
    </div>
    <div class="box">
      <canvas id="c192" width="192" height="192" style="border-radius:42px;box-shadow:0 8px 32px rgba(79,70,229,0.45)"></canvas>
      192 × 192
    </div>
    <div class="box">
      <canvas id="c64" width="64" height="64" style="border-radius:14px;box-shadow:0 4px 16px rgba(79,70,229,0.4)"></canvas>
      64 × 64 (preview)
    </div>
  </div>

  <div class="btns">
    <a id="dl512" download="icon-512.png">⬇ Download icon-512.png</a>
    <a id="dl192" download="icon-192.png">⬇ Download icon-192.png</a>
  </div>

<script>
function draw(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s   = size;

  // ── Full-bleed background ─────────────────────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, s * 0.6, s);
  bg.addColorStop(0, '#0d1117');
  bg.addColorStop(1, '#130d2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, s, s);

  // Indigo bloom — bottom-centre upward
  const bloom = ctx.createRadialGradient(s*.52, s*.88, 0, s*.52, s*.72, s*.72);
  bloom.addColorStop(0,   'rgba(99,102,241,0.42)');
  bloom.addColorStop(0.5, 'rgba(79,70,229,0.15)');
  bloom.addColorStop(1,   'rgba(79,70,229,0)');
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, s, s);

  // Top-left depth glow
  const corner = ctx.createRadialGradient(0, 0, 0, 0, 0, s*.55);
  corner.addColorStop(0, 'rgba(129,140,248,0.10)');
  corner.addColorStop(1, 'rgba(129,140,248,0)');
  ctx.fillStyle = corner;
  ctx.fillRect(0, 0, s, s);

  // ── Chart frame + faint grid lines ───────────────────────────────────────
  const padL  = s * 0.135;
  const padR  = s * 0.135;
  const yBot  = s * 0.775;
  const yTop  = s * 0.185;
  const chartW = s - padL - padR;
  const chartH = yBot - yTop;

  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.lineWidth   = Math.max(1, s * 0.002);
  [0.0, 0.33, 0.66, 1.0].forEach(t => {
    const y = yTop + chartH * t;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(s - padR, y); ctx.stroke();
  });

  // ── 3 bars (increasing height, left → right) ─────────────────────────────
  const gap   = chartW * 0.06;
  const bw    = (chartW - gap * 2) / 3;
  const fracs = [0.42, 0.65, 0.93];

  fracs.forEach((frac, i) => {
    const x   = padL + i * (bw + gap);
    const bh  = chartH * frac;
    const byt = yBot - bh;
    const rr  = Math.max(2, s * 0.018);

    const fill = ctx.createLinearGradient(0, byt, 0, yBot);
    fill.addColorStop(0,    'rgba(148,155,255,0.62)');
    fill.addColorStop(0.35, 'rgba(120,130,250,0.38)');
    fill.addColorStop(1,    'rgba(80,90,220,0.08)');
    ctx.fillStyle = fill;

    // Rounded-top rect (top corners rounded, bottom square)
    ctx.beginPath();
    ctx.moveTo(x + rr, byt);
    ctx.lineTo(x + bw - rr, byt);
    ctx.quadraticCurveTo(x + bw, byt, x + bw, byt + rr);
    ctx.lineTo(x + bw, yBot);
    ctx.lineTo(x,      yBot);
    ctx.lineTo(x,      byt + rr);
    ctx.quadraticCurveTo(x, byt, x + rr, byt);
    ctx.closePath();
    ctx.fill();

    // Bright top-cap line
    ctx.strokeStyle = 'rgba(200,205,255,0.45)';
    ctx.lineWidth   = Math.max(1, s * 0.005);
    ctx.beginPath();
    ctx.moveTo(x + rr, byt + 1); ctx.lineTo(x + bw - rr, byt + 1);
    ctx.stroke();
  });

  // ── Trend line through bar top-centres ───────────────────────────────────
  const pts = fracs.map((frac, i) => [
    padL + i * (bw + gap) + bw / 2,
    yBot - chartH * frac,
  ]);

  const ext    = bw * 0.55;
  const allPts = [
    [pts[0][0] - ext,            pts[0][1] + chartH * 0.10],
    ...pts,
    [pts[pts.length-1][0] + ext * 0.4, pts[pts.length-1][1] - chartH * 0.025],
  ];

  // 3 passes: wide soft glow → tighter glow → crisp white line
  [[s*.10, 'rgba(180,186,255,0.18)'],
   [s*.06, 'rgba(210,215,255,0.28)'],
   [s*.038,'#ffffff'],
  ].forEach(([lw, color]) => {
    ctx.strokeStyle = color;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(allPts[0][0], allPts[0][1]);
    for (let i = 0; i < allPts.length - 1; i++) {
      const mx = (allPts[i][0] + allPts[i+1][0]) / 2;
      const my = (allPts[i][1] + allPts[i+1][1]) / 2;
      ctx.quadraticCurveTo(allPts[i][0], allPts[i][1], mx, my);
    }
    ctx.lineTo(allPts[allPts.length-1][0], allPts[allPts.length-1][1]);
    ctx.stroke();
  });

  // ── Glowing live-price dot at peak ───────────────────────────────────────
  const [px, py] = pts[pts.length - 1];

  [[s*.115,'rgba(165,180,252,0.12)'],
   [s*.075,'rgba(165,180,252,0.22)'],
   [s*.048,'rgba(255,255,255,0.55)'],
  ].forEach(([r, color]) => {
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
  });

  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(px, py, s*.048, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#4f46e5';
  ctx.beginPath(); ctx.arc(px, py, s*.022, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.70)';
  ctx.beginPath(); ctx.arc(px - s*.014, py - s*.014, s*.010, 0, Math.PI*2); ctx.fill();
}

[512, 192, 64].forEach(sz => {
  const c = document.getElementById(`c${sz}`);
  if (c) draw(c, sz);
});
document.getElementById('dl512').href = document.getElementById('c512').toDataURL('image/png');
document.getElementById('dl192').href = document.getElementById('c192').toDataURL('image/png');
</script>
</body>
</html>

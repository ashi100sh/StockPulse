<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" id="themeColorMeta" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StockPulse" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <title>StockPulse</title>
  <style>
    /* ── Dark theme (default) ── */
    :root {
      --bg:#0f1117; --bg2:#1a1d27; --bg3:#242736;
      --border:#2e3248; --text:#e2e8f0; --muted:#7985a0;
      --accent:#6366f1; --accent-glow:rgba(99,102,241,0.3); --accent-dim:rgba(99,102,241,0.12);
      --green:#22c55e; --green-dim:rgba(34,197,94,0.14);
      --red:#ef4444;   --red-dim:rgba(239,68,68,0.14);
      --shadow:0 4px 24px rgba(0,0,0,0.45);
      --card-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    /* ── Light theme ── */
    [data-theme="light"] {
      --bg:#f0f4fb; --bg2:#ffffff; --bg3:#f4f7ff;
      --border:#dde3f0; --text:#1a1d2e; --muted:#64748b;
      --accent:#5254cc; --accent-glow:rgba(82,84,204,0.2); --accent-dim:rgba(82,84,204,0.08);
      --green:#16a34a; --green-dim:rgba(22,163,74,0.1);
      --red:#dc2626;   --red-dim:rgba(220,38,38,0.1);
      --shadow:0 4px 24px rgba(80,100,180,0.1);
      --card-shadow:0 1px 4px rgba(80,100,180,0.07);
    }

    /* ── Reset / Base ── */
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
                background:var(--bg); color:var(--text); font-size:14px;
                overscroll-behavior:none; -webkit-font-smoothing:antialiased; }

    /* ── Layout ── */
    .shell { display:flex; flex-direction:column; height:100vh; height:100dvh; }
    .topbar { background:var(--bg2); border-bottom:1px solid var(--border);
              padding:11px 14px; display:flex; align-items:center; gap:8px;
              flex-shrink:0; box-shadow:var(--card-shadow); }
    .topbar-brand { font-size:16px; font-weight:800; flex:1; letter-spacing:-0.3px;
                    display:flex; align-items:center; gap:7px; }
    .brand-icon { width:26px; height:26px; background:var(--accent); border-radius:7px;
                  display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .brand-icon svg { width:15px; height:15px; color:#fff; }
    .build-badge { font-size:10px; font-weight:600; color:var(--muted);
                   background:var(--bg3); border:1px solid var(--border);
                   border-radius:5px; padding:2px 6px; letter-spacing:0; font-family:'Inter',sans-serif; }
    .content { flex:1; overflow-y:auto; padding:0 0 72px; }
    .bottomnav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2);
                 border-top:1px solid var(--border); display:flex; z-index:100;
                 padding-bottom:env(safe-area-inset-bottom);
                 box-shadow:0 -2px 12px rgba(0,0,0,0.1); }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
               padding:9px 4px 12px; font-size:10px; font-weight:600; color:var(--muted);
               background:none; border:none; cursor:pointer; transition:color 0.15s; }
    .nav-btn.active { color:var(--accent); }
    .nav-btn svg { width:21px; height:21px; }

    /* ── Pages ── */
    .page { display:none; }
    .page.active { display:block; }

    /* ── Summary strip ── */
    .summary-strip { display:grid; grid-template-columns:repeat(2,1fr);
                     gap:1px; background:var(--border); margin-bottom:1px; }
    .sum-cell { background:var(--bg2); padding:14px 16px; }
    .sum-label { font-size:10px; font-weight:700; color:var(--muted);
                 text-transform:uppercase; letter-spacing:0.06em; margin-bottom:5px; }
    .sum-val { font-size:20px; font-weight:800; letter-spacing:-0.5px; }

    /* ── Action row ── */
    .action-row { display:flex; gap:8px; padding:12px 14px 4px; }
    .action-btn { flex:1; padding:10px 8px; border-radius:10px; border:1.5px solid var(--border);
                  background:var(--bg3); color:var(--text); font-size:12px; font-weight:600;
                  font-family:inherit; cursor:pointer; display:flex; align-items:center;
                  justify-content:center; gap:5px; transition:border-color 0.15s,color 0.15s; }
    .action-btn:active { border-color:var(--accent); color:var(--accent); }
    .action-btn svg { width:13px; height:13px; flex-shrink:0; }

    /* ── Section header ── */
    .section-header { padding:13px 16px 7px; display:flex; align-items:center;
                      justify-content:space-between; }
    .section-title { font-size:11px; font-weight:700; color:var(--muted);
                     text-transform:uppercase; letter-spacing:0.07em; }
    .swipe-hint-txt { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:3px; }

    /* ── Swipe-delete wrapper ── */
    .swipe-wrap { position:relative; overflow:hidden; border-bottom:1px solid var(--border); }
    .delete-reveal { position:absolute; right:0; top:0; bottom:0; width:80px;
                     background:var(--red); display:flex; flex-direction:column;
                     align-items:center; justify-content:center; gap:3px;
                     cursor:pointer; z-index:1; user-select:none; }
    .delete-reveal svg { width:20px; height:20px; color:#fff; }
    .delete-reveal span { font-size:11px; font-weight:700; color:#fff; }
    .swipe-item { position:relative; z-index:2; background:var(--bg2);
                  touch-action:pan-y; will-change:transform; }

    /* ── Holding card ── */
    .holding-card { padding:13px 16px; display:flex; align-items:center; gap:11px; cursor:pointer; }
    .holding-card:active { background:var(--bg3); }
    .hc-icon { width:42px; height:42px; border-radius:11px; background:var(--accent-dim);
               border:1px solid var(--border); display:flex; align-items:center;
               justify-content:center; font-weight:800; font-size:12px; color:var(--accent);
               flex-shrink:0; letter-spacing:-0.5px; }
    .hc-body { flex:1; min-width:0; }
    .hc-top { display:flex; justify-content:space-between; align-items:baseline; gap:4px; }
    .hc-symbol { font-weight:800; font-size:15px; letter-spacing:-0.3px; }
    .hc-price { font-weight:700; font-size:14px; }
    .hc-mid { display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
    .hc-name { color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden;
               text-overflow:ellipsis; max-width:160px; }
    .hc-pl { font-size:12px; font-weight:700; }
    .hc-perfs { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
    .perf-pill { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap; }
    .perf-pill.pos { background:var(--green-dim); color:var(--green); }
    .perf-pill.neg { background:var(--red-dim); color:var(--red); }
    .perf-pill.na  { background:var(--bg3); color:var(--muted); }

    .pos { color:var(--green); }
    .neg { color:var(--red); }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:64px 20px; color:var(--muted); }
    .empty-state .icon { font-size:52px; margin-bottom:14px; }
    .empty-state p { font-size:16px; font-weight:700; margin-bottom:8px; color:var(--text); }
    .empty-state small { font-size:13px; line-height:1.5; }

    /* ── FAB ── */
    .fab { position:fixed; bottom:84px; right:18px; width:54px; height:54px;
           border-radius:50%; background:var(--accent); border:none; color:#fff;
           cursor:pointer; box-shadow:0 4px 24px var(--accent-glow);
           display:flex; align-items:center; justify-content:center;
           z-index:99; transition:transform 0.15s,box-shadow 0.15s; }
    .fab:active { transform:scale(0.92); box-shadow:0 2px 12px var(--accent-glow); }
    .fab svg { width:24px; height:24px; }

    /* ── Sheet (bottom drawer) ── */
    .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:200;
                     display:none; align-items:flex-end; backdrop-filter:blur(3px); }
    .sheet-overlay.open { display:flex; }
    .sheet { background:var(--bg2); border-radius:22px 22px 0 0; width:100%;
             max-height:95vh; overflow-y:auto;
             padding:0 0 env(safe-area-inset-bottom); }
    .sheet-handle { width:36px; height:4px; background:var(--border);
                    border-radius:2px; margin:12px auto 8px; }
    .sheet-header { padding:0 20px 14px; display:flex; align-items:center; justify-content:space-between; }
    .sheet-title { font-size:18px; font-weight:800; }
    .sheet-close { background:var(--bg3); border:none; color:var(--muted);
                   width:32px; height:32px; border-radius:50%; font-size:16px;
                   cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .sheet-body { padding:0 20px 24px; }

    /* ── Search ── */
    .search-wrap { position:relative; margin-bottom:14px; }
    .search-input { width:100%; background:var(--bg3); border:1.5px solid var(--border);
                    border-radius:12px; color:var(--text); padding:12px 42px 12px 14px;
                    font-size:16px; font-family:inherit; outline:none; transition:border-color 0.15s; }
    .search-input:focus { border-color:var(--accent); }
    .search-spinner { position:absolute; right:13px; top:50%; transform:translateY(-50%); display:none; }
    .search-spinner.on { display:block; }
    .spin { width:18px; height:18px; border:2px solid var(--border);
            border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .search-results { background:var(--bg3); border:1px solid var(--border);
                      border-radius:12px; overflow:hidden; margin-bottom:14px; display:none; }
    .search-results.show { display:block; }
    .result-item { padding:11px 14px; border-bottom:1px solid var(--border);
                   cursor:pointer; display:flex; align-items:center; gap:10px; }
    .result-item:last-child { border-bottom:none; }
    .result-item:active { background:var(--bg2); }
    .result-sym { font-weight:700; font-size:14px; }
    .result-name { font-size:12px; color:var(--muted); white-space:nowrap;
                   overflow:hidden; text-overflow:ellipsis; }
    .result-exch { margin-left:auto; font-size:11px; font-weight:600;
                   background:var(--accent-dim); border:1px solid transparent;
                   padding:2px 7px; border-radius:5px; color:var(--accent); white-space:nowrap; }
    .result-exch.foreign { background:var(--bg2); color:var(--muted); border-color:var(--border); }
    .selected-sym { background:var(--accent-dim); border:1.5px solid var(--accent);
                    border-radius:12px; padding:10px 14px; margin-bottom:14px; display:none; }
    .selected-sym.show { display:flex; align-items:center; gap:10px; }
    .selected-sym-name { flex:1; }
    .selected-sym-name strong { display:block; font-size:14px; font-weight:700; }
    .selected-sym-name small { color:var(--muted); font-size:12px; }
    .selected-clear { background:none; border:none; color:var(--muted);
                      font-size:18px; cursor:pointer; padding:4px; }

    /* ── Form fields ── */
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12px; font-weight:600;
                   color:var(--muted); margin-bottom:6px; }
    .field input { width:100%; background:var(--bg3); border:1.5px solid var(--border);
                   border-radius:12px; color:var(--text); padding:12px 14px;
                   font-size:16px; font-family:inherit; outline:none; transition:border-color 0.15s; }
    .field input:focus { border-color:var(--accent); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Buttons ── */
    .btn-full { width:100%; padding:14px; border-radius:13px; border:none;
                font-size:15px; font-weight:700; font-family:inherit;
                cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 18px var(--accent-glow); }
    .btn-primary:active { opacity:0.85; transform:scale(0.98); }
    .btn-primary:disabled { opacity:0.35; cursor:not-allowed; box-shadow:none; }

    /* ── Topbar controls ── */
    .icon-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text);
                border-radius:9px; padding:7px 10px; cursor:pointer; font-size:13px;
                font-weight:600; font-family:inherit; display:flex; align-items:center;
                gap:5px; transition:border-color 0.15s,color 0.15s; white-space:nowrap; }
    .icon-btn:active { border-color:var(--accent); color:var(--accent); }
    .icon-btn svg { width:13px; height:13px; }
    .theme-btn { font-size:16px; padding:6px 9px; }
    .last-update { font-size:11px; color:var(--muted); font-weight:500; }

    /* ── Toast ── */
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
             background:var(--bg3); border:1px solid var(--border); border-radius:11px;
             padding:10px 18px; font-size:13px; font-weight:600; z-index:500;
             opacity:0; transition:all 0.25s; white-space:nowrap;
             pointer-events:none; box-shadow:var(--shadow); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Analytics (Performance) table ── */
    .analytics-toolbar { padding:12px 14px 8px; display:flex; align-items:center;
                         justify-content:space-between; gap:8px; }
    .analytics-title { font-size:11px; font-weight:700; color:var(--muted);
                       text-transform:uppercase; letter-spacing:0.07em; }
    .analytics-hint { font-size:11px; color:var(--muted); }
    .perf-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:20px; }
    .perf-table { width:100%; border-collapse:collapse; min-width:460px; }
    .perf-table thead { position:sticky; top:0; z-index:5; }
    .perf-table th { background:var(--bg2); padding:10px 10px; font-size:10px; font-weight:700;
                     color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;
                     text-align:right; cursor:pointer; white-space:nowrap;
                     border-bottom:2px solid var(--border); user-select:none;
                     transition:color 0.15s; }
    .perf-table th:first-child { text-align:left; padding-left:16px; }
    .perf-table th:last-child  { padding-right:16px; }
    .perf-table th:hover { color:var(--text); }
    .perf-table th.sort-asc  { color:var(--accent); }
    .perf-table th.sort-asc::after  { content:' ↑'; }
    .perf-table th.sort-desc { color:var(--accent); }
    .perf-table th.sort-desc::after { content:' ↓'; }
    .perf-table td { padding:11px 10px; font-size:13px; text-align:right;
                     border-bottom:1px solid var(--border); }
    .perf-table td:first-child { text-align:left; padding-left:16px; }
    .perf-table td:last-child  { padding-right:16px; }
    .perf-table tr { cursor:pointer; }
    .perf-table tr:active td { background:var(--bg3); }
    .td-sym  { font-weight:800; font-size:13px; display:block; letter-spacing:-0.3px; }
    .td-name { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden;
               text-overflow:ellipsis; max-width:110px; display:block; margin-top:2px; }
    .pct-pos { font-weight:700; color:var(--green); }
    .pct-neg { font-weight:700; color:var(--red); }
    .pct-na  { color:var(--muted); }
    .price-cell { font-weight:600; }
    .val-cell   { font-weight:800; }

    /* ── Detail sheet ── */
    .detail-header { padding:16px 20px 12px; }
    .detail-sym   { font-size:26px; font-weight:800; letter-spacing:-0.5px; }
    .detail-name  { color:var(--muted); font-size:14px; margin-top:3px; }
    .detail-price { font-size:34px; font-weight:800; margin-top:14px; letter-spacing:-1px; }
    .detail-pl    { font-size:15px; margin-top:5px; font-weight:600; }
    .perf-grid  { display:grid; grid-template-columns:repeat(2,1fr);
                  gap:1px; background:var(--border); margin:12px 0; }
    .perf-cell  { background:var(--bg3); padding:14px 16px; }
    .perf-cell-label { font-size:10px; font-weight:700; color:var(--muted);
                       text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px; }
    .perf-cell-val { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
    .detail-meta { padding:0 20px; }
    .meta-row { display:flex; justify-content:space-between; padding:11px 0;
                border-bottom:1px solid var(--border); font-size:14px; }
    .meta-row:last-child { border-bottom:none; }
    .meta-key { color:var(--muted); font-weight:500; }
    .meta-val { font-weight:700; }
    .detail-actions { padding:16px 20px 20px; }
    .btn-del { width:100%; padding:14px; border-radius:13px; border:none;
               background:var(--red-dim); color:var(--red); font-size:15px;
               font-weight:700; font-family:inherit; cursor:pointer;
               display:flex; align-items:center; justify-content:center; gap:8px;
               transition:background 0.15s; }
    .btn-del:active { background:var(--red); color:#fff; }
    .btn-del svg { width:16px; height:16px; }

    /* ── Confirm dialog ── */
    .dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:400;
                      display:none; align-items:center; justify-content:center;
                      padding:20px; backdrop-filter:blur(4px); }
    .dialog-overlay.open { display:flex; }
    .dialog { background:var(--bg2); border-radius:20px; padding:28px 24px 22px;
              max-width:320px; width:100%; text-align:center;
              box-shadow:var(--shadow); border:1px solid var(--border); }
    .dialog-icon  { font-size:42px; margin-bottom:12px; }
    .dialog-title { font-size:18px; font-weight:800; margin-bottom:8px; }
    .dialog-msg   { font-size:14px; color:var(--muted); margin-bottom:22px; line-height:1.5; }
    .dialog-actions { display:flex; gap:10px; }
    .dialog-cancel { flex:1; padding:13px; border-radius:12px; border:1.5px solid var(--border);
                     background:var(--bg3); color:var(--text); font-size:15px; font-weight:700;
                     font-family:inherit; cursor:pointer; }
    .dialog-ok { flex:1; padding:13px; border-radius:12px; border:none; background:var(--red);
                 color:#fff; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; }
    .dialog-ok:active { opacity:0.85; }
    .dialog-cancel:active { background:var(--border); }

    /* ── Version footer ── */
    .version-footer { text-align:center; padding:12px 16px 6px;
                      font-size:11px; color:var(--muted); font-weight:500; }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Topbar ── -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      StockPulse
      <span class="build-badge" id="buildBadge">—</span>
    </div>
    <span class="last-update" id="lastUpdate"></span>
    <button class="icon-btn theme-btn" onclick="cycleTheme()" id="themeBtn" title="Toggle theme">☀️</button>
    <button class="icon-btn" id="refreshBtn" onclick="refreshAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- ── Content ── -->
  <div class="content">

    <!-- PAGE: Portfolio -->
    <div class="page active" id="page-portfolio">
      <div class="summary-strip">
        <div class="sum-cell">
          <div class="sum-label">Invested</div>
          <div class="sum-val" id="sumInvested">₹0</div>
        </div>
        <div class="sum-cell">
          <div class="sum-label">Current</div>
          <div class="sum-val" id="sumCurrent">₹0</div>
        </div>
        <div class="sum-cell">
          <div class="sum-label">P&amp;L</div>
          <div class="sum-val" id="sumPL">₹0</div>
        </div>
        <div class="sum-cell">
          <div class="sum-label">Return</div>
          <div class="sum-val" id="sumReturn">0%</div>
        </div>
      </div>

      <div class="action-row">
        <button class="action-btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <button class="action-btn" onclick="document.getElementById('csvInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Import CSV
        </button>
        <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="importCSV(this)" />
      </div>

      <div class="section-header">
        <span class="section-title">Holdings</span>
        <span class="swipe-hint-txt">

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  Build
// ─────────────────────────────────────────────────────────────────────────────
const APP_BUILD  = '20260317.8';
const STALE_MS   = 4 * 60 * 60 * 1000; // 4 h – auto-refresh threshold on PWA open
const CACHE_KEY  = 'sp_live_v1';        // localStorage key for live-price cache
const REFRESH_ICO = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Refresh`;
const SPIN_ICO    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 0.7s linear infinite"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>`;

// Yahoo Finance uses 'NSI' internally for NSE India — map to friendly labels
const EXCH_DISPLAY = { NSI: 'NSE', BOM: 'BSE' };

// ─────────────────────────────────────────────────────────────────────────────
//  Constants & Symbol helpers
// ─────────────────────────────────────────────────────────────────────────────
const YF_SEARCH = 'https://query2.finance.yahoo.com/v1/finance/search?q=';
const YF_CHART  = 'https://query1.finance.yahoo.com/v8/finance/chart/';

const NSE_EX = new Set(['NSI', 'NSE']);
const BSE_EX = new Set(['BSE', 'BOM']);

/** Auto-append .NS / .BO when exchange is Indian and symbol has no suffix */
function normalizeYfSymbol(raw, exchange) {
  const s = (raw || '').trim().toUpperCase();
  if (!s || s.includes('.')) return s;
  const ex = (exchange || '').toUpperCase();
  if (NSE_EX.has(ex)) return s + '.NS';
  if (BSE_EX.has(ex)) return s + '.BO';
  return s;
}

/** Strip .NS / .BO suffix for display */
function displaySym(s) { return (s || '').replace(/\.(NS|BO)$/i, ''); }

// ─────────────────────────────────────────────────────────────────────────────
//  CORS Proxies — raced in parallel; first valid response wins
// ─────────────────────────────────────────────────────────────────────────────
const PROXY_DEFS = [
  // Direct fetch — Yahoo Finance chart API sometimes returns CORS headers
  // when corsDomain param is present; fast-fails if blocked (no cost to racing)
  {
    make: u => u.includes('finance.yahoo.com')
      ? u + (u.includes('?') ? '&' : '?') + 'corsDomain=finance.yahoo.com'
      : u,
    extract: async r => r.text()
  },
  // corsproxy.io — URL not encoded (some proxies prefer raw URL)
  {
    make: u => 'https://corsproxy.io/?' + u,
    extract: async r => r.text()
  },
  // corsproxy.io — URL encoded
  {
    make: u => 'https://corsproxy.io/?' + encodeURIComponent(u),
    extract: async r => r.text()
  },
  // allorigins /get — wraps in JSON { contents: "..." }
  {
    make: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
    extract: async r => { const d = await r.json(); if (!d.contents) throw new Error('empty'); return d.contents; }
  },
  // allorigins /raw — direct pass-through
  {
    make: u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    extract: async r => r.text()
  },
  // cors.sh
  {
    make: u => 'https://proxy.cors.sh/' + u,
    extract: async r => r.text()
  },
  // corsproxy.org — last resort
  {
    make: u => 'https://corsproxy.org/?' + encodeURIComponent(u),
    extract: async r => r.text()
  },
];

const PROXY_TIMEOUT_MS = 7000; // abort any proxy that doesn't respond within 7s

async function proxyFetch(rawUrl) {
  const controllers = PROXY_DEFS.map(() => new AbortController());

  // Auto-abort each request after PROXY_TIMEOUT_MS so hanging proxies
  // don't keep Promise.any waiting forever
  const timers = controllers.map(c =>
    setTimeout(() => c.abort(), PROXY_TIMEOUT_MS)
  );

  const attempts = PROXY_DEFS.map(async ({ make, extract }, i) => {
    try {
      const res = await fetch(make(rawUrl), {
        signal: controllers[i].signal,
        cache: 'no-store',
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await extract(res);
      if (!text) throw new Error('empty response');
      // Cancel remaining in-flight requests
      controllers.forEach((c, j) => { if (j !== i) c.abort(); });
      timers.forEach(clearTimeout);
      return new Response(text, { headers: { 'Content-Type': 'application/json' } });
    } finally {
      clearTimeout(timers[i]);
    }
  });

  try {
    return await Promise.any(attempts);
  } catch {
    throw new Error('All proxies failed');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────────────
let portfolio   = loadPortfolio();
let liveData    = {};          // yf_symbol -> { price, pct_1w, pct_1m, pct_3m, pct_1y }
let selectedSym = null;
let searchTimer = null;
let sortCol = 'value', sortDir = -1;   // analytics table sort state
let isRefreshing = false;              // true while sequential refresh is running
let refreshAbort = false;              // set to true to stop in-progress refresh
const fetchingSyms = new Set();        // yf_symbols currently being fetched

// ─────────────────────────────────────────────────────────────────────────────
//  Theme
// ─────────────────────────────────────────────────────────────────────────────
let currentTheme = localStorage.getItem('sp_theme') || 'dark';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeColorMeta').content = currentTheme === 'dark' ? '#0f1117' : '#f0f4fb';
  localStorage.setItem('sp_theme', currentTheme);
}

function cycleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme();
}

// ─────────────────────────────────────────────────────────────────────────────
//  LocalStorage
// ─────────────────────────────────────────────────────────────────────────────
function loadPortfolio() {
  try { return JSON.parse(localStorage.getItem('ptf_v1') || '[]'); }
  catch { return []; }
}
function savePortfolio() {
  localStorage.setItem('ptf_v1', JSON.stringify(portfolio));
}

// ─────────────────────────────────────────────────────────────────────────────
//  Live-price cache
// ─────────────────────────────────────────────────────────────────────────────
function loadLiveCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); }
  catch { return null; }
}
function saveLiveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: liveData })); }
  catch {}
}
function isCacheStale() {
  const c = loadLiveCache();
  return !c || !c.ts || (Date.now() - c.ts) > STALE_MS;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Navigation
// ─────────────────────────────────────────────────────────────────────────────
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'heatmap') renderAnalytics();
}

// ─────────────────────────────────────────────────────────────────────────────
//  Symbol Search
// ─────────────────────────────────────────────────────────────────────────────
function onSymSearch(q) {
  clearTimeout(searchTimer);
  const results = document.getElementById('searchResults');
  if (q.length < 2) { results.classList.remove('show'); return; }
  document.getElementById('searchSpinner').classList.add('on');
  searchTimer = setTimeout(() => searchSymbols(q), 350);
}

async function searchSymbols(q) {
  const spinner = document.getElementById('searchSpinner');
  const results = document.getElementById('searchResults');
  try {
    const url = YF_SEARCH + encodeURIComponent(q) +
      '&lang=en-US&region=IN&quotesCount=10&enableFuzzyQuery=true';
    const res = await proxyFetch(url);
    const data = await res.json();

    // Sort: Indian exchanges first
    const INDIAN_ALL = new Set([...NSE_EX, ...BSE_EX, 'MUTUALFUND']);
    const isIndian = s => INDIAN_ALL.has(s.exchange) ||
                          s.symbol?.endsWith('.NS') || s.symbol?.endsWith('.BO');
    const quotes = (data.quotes || []).sort((a, b) => (isIndian(a) ? 0 : 1) - (isIndian(b) ? 0 : 1));

    if (quotes.length === 0) {
      results.innerHTML = '<div class="result-item"><span style="color:var(--muted)">No results found</span></div>';
    } else {
      results.innerHTML = quotes.map(q => {
        const exch     = q.exchange || q.quoteType || '';
        const exchDisp = EXCH_DISPLAY[exch] || exch;   // NSI→NSE, BOM→BSE
        const indian   = isIndian(q);
        const sym      = displaySym(q.symbol);
        return `<div class="result-item" onclick="selectSym('${esc(q.symbol)}','${esc(q.shortname||q.longname||q.symbol)}','${esc(exch)}')">
          <div style="flex:1;min-width:0">
            <div class="result-sym">${sym}</div>
            <div class="result-name">${q.shortname || q.longname || ''}</div>
          </div>
          <span class="result-exch ${indian ? '' : 'foreign'}">${exchDisp}</span>
        </div>`;
      }).join('');
    }
    results.classList.add('show');
  } catch {
    // All proxies failed — offer "use typed symbol directly" so the user
    // isn't completely blocked from adding a holding
    const typed = document.getElementById('symSearch').value.trim().toUpperCase();
    if (typed) {
      results.innerHTML = `
        <div class="result-item" style="flex-direction:column;gap:6px;align-items:flex-start">
          <span style="color:var(--muted);font-size:12px">Search unavailable (proxy error). Add directly:</span>
        </div>
        <div class="result-item" onclick="selectSym('${esc(typed + '.NS')}','${esc(typed)}','NSI')">
          <div style="flex:1"><div class="result-sym">${typed}</div><div class="result-name">Add as NSE stock</div></div>
          <span class="result-exch">NSE</span>
        </div>
        <div class="result-item" onclick="selectSym('${esc(typed + '.BO')}','${esc(typed)}','BOM')">
          <div style="flex:1"><div class="result-sym">${typed}</div><div class="result-name">Add as BSE stock</div></div>
          <span class="result-exch">BSE</span>
        </div>`;
    } else {
      results.innerHTML = '<div class="result-item"><span style="color:var(--muted)">Search unavailable — type a symbol and try again</span></div>';
    }
    results.classList.add('show');
  } finally {
    spinner.classList.remove('on');
  }
}

function esc(s) { return String(s).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }

function selectSym(symbol, name, exchange) {
  const yf_symbol = normalizeYfSymbol(symbol, exchange);
  selectedSym = { symbol: displaySym(symbol), yf_symbol, name, exchange };
  document.getElementById('symSearch').value = '';
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('selSymText').textContent = selectedSym.symbol;
  document.getElementById('selNameText').textContent = name + (exchange ? ' · ' + (EXCH_DISPLAY[exchange] || exchange) : '');
  document.getElementById('selectedSym').classList.add('show');
  document.getElementById('addBtn').disabled = false;
}

function clearSym() {
  selectedSym = null;
  document.getElementById('selectedSym').classList.remove('show');
  document.getElementById('addBtn').disabled = true;
  document.getElementById('symSearch').value = '';
}

// ─────────────────────────────────────────────────────────────────────────────
//  Add Sheet
// ─────────────────────────────────────────────────────────────────────────────
function openAddSheet() {
  document.getElementById('addSheet').classList.add('open');
  setTimeout(() => document.getElementById('symSearch').focus(), 200);
}
function closeAddSheet() {
  document.getElementById('addSheet').classList.remove('open');
  clearSym();
  ['fBuyPrice', 'fQty', 'fDate'].forEach(id => document.getElementById(id).value = '');
}

function addHolding() {
  if (!selectedSym) return;
  const bp  = parseFloat(document.getElementById('fBuyPrice').value);
  const qty = parseFloat(document.getElementById('fQty').value);
  if (!bp || bp <= 0 || !qty || qty <= 0) { showToast('Enter valid price and quantity'); return; }

  const sym        = selectedSym.yf_symbol;
  const symDisplay = selectedSym.symbol; // capture before closeAddSheet() nulls selectedSym
  portfolio.push({
    id:        Date.now(),
    symbol:    selectedSym.symbol,
    yf_symbol: sym,
    name:      selectedSym.name,
    exchange:  selectedSym.exchange,
    buy_price: bp,
    qty,
    buy_date:  document.getElementById('fDate').value || '',
  });
  savePortfolio();
  closeAddSheet();
  showToast('Added ' + symDisplay);

  // Render immediately with "Fetching…" pill — no wait
  fetchingSyms.add(sym);
  renderPortfolio();

  // Fetch only this one symbol in the background with auto-retry
  (async () => {
    const MAX_TRIES = 3;
    let d = null;
    for (let attempt = 1; attempt <= MAX_TRIES; attempt++) {
      if (attempt > 1) {
        // Wait before retry and show progress on each card pill
        await new Promise(r => setTimeout(r, 2000 * (attempt - 1)));
        portfolio.filter(h => h.yf_symbol === sym).forEach(h => {
          const el = document.getElementById(`hcperf-${h.id}`);
          if (el) el.innerHTML = `<span class="perf-pill na">⟳ Retry ${attempt}/${MAX_TRIES}…</span>`;
        });
      }
      d = await fetchLive(sym);
      if (d) break;
    }
    fetchingSyms.delete(sym);
    if (d) liveData[sym] = d;
    portfolio.filter(h => h.yf_symbol === sym).forEach(h => updateCard(h.id));
    updateSummary();
    saveLiveCache();
    if (document.getElementById('page-heatmap').classList.contains('active')) renderAnalytics();
  })();
}

// ─────────────────────────────────────────────────────────────────────────────
//  Live Data
// ─────────────────────────────────────────────────────────────────────────────
async function fetchLive(yf_symbol) {
  try {
    const url = YF_CHART + encodeURIComponent(yf_symbol) + '?interval=1d&range=1y&corsDomain=finance.yahoo.com';
    const res  = await proxyFetch(url);
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) return null;
    const closes = result.indicators.quote[0].close;
    const ts     = result.timestamp;
    const valid  = closes.filter(c => c != null);
    if (!valid.length) return null;
    const cur  = valid[valid.length - 1];
    const meta = result.meta || {};

    function pctAt(daysAgo) {
      const targetTs = ts[ts.length - 1] - daysAgo * 86400;
      for (let i = ts.length - 2; i >= 0; i--) {
        if (ts[i] <= targetTs && closes[i] != null) {
          const best = closes[i];
          return best === 0 ? null : parseFloat(((cur - best) / best * 100).toFixed(2));
        }
      }
      return null;
    }

    return {
      price:   parseFloat(cur.toFixed(2)),
      pct_1w:  pctAt(7),
      pct_1m:  pctAt(30),
      pct_3m:  pctAt(90),
      pct_1y:  pctAt(365),
      currency: meta.currency || '₹',
    };
  } catch { return null; }
}

async function refreshAll() {
  if (isRefreshing) { showToast('Refresh in progress…'); return; }

  const unique = [...new Set(portfolio.map(h => h.yf_symbol))];
  if (!unique.length) return;

  isRefreshing = true;
  refreshAbort = false;
  const btn = document.getElementById('refreshBtn');
  let done = 0;

  for (const sym of unique) {
    if (refreshAbort) break;
    done++;
    btn.innerHTML = SPIN_ICO + ` ${done}/${unique.length}`;

    // Mark cards for this symbol as "Fetching…"
    fetchingSyms.add(sym);
    portfolio.filter(h => h.yf_symbol === sym).forEach(h => {
      const el = document.getElementById(`hcperf-${h.id}`);
      if (el) el.innerHTML = '<span class="perf-pill na">⟳ Fetching…</span>';
    });

    const d = await fetchLive(sym);
    fetchingSyms.delete(sym);
    if (d) liveData[sym] = d;

    // Update cards + summary live as each result arrives
    portfolio.filter(h => h.yf_symbol === sym).forEach(h => updateCard(h.id));
    updateSummary();
  }

  if (!refreshAbort) {
    saveLiveCache();
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  isRefreshing = false;
  refreshAbort = false;
  btn.innerHTML = REFRESH_ICO;

  // Refresh analytics table if it's currently visible
  if (document.getElementById('page-heatmap').classList.contains('active')) {
    renderAnalytics();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Portfolio Render
// ─────────────────────────────────────────────────────────────────────────────
function renderPortfolio() {
  const list = document.getElementById('holdingsList');

  if (portfolio.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">📈</div>
      <p>No holdings yet</p>
      <small>Tap + to add your first stock or import a CSV from Zerodha / Groww</small>
    </div>`;
    ['sumInvested','sumCurrent','sumPL','sumReturn'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.textContent = i < 3 ? '₹0' : '0%';
      el.className = 'sum-val';
    });
    return;
  }

  list.innerHTML = portfolio.map(h => {
    const d        = liveData[h.yf_symbol];
    const invested = h.buy_price * h.qty;
    const curVal   = d ? d.price * h.qty : invested;
    const pl       = curVal - invested;
    const plPct    = invested ? pl / invested * 100 : 0;

    const priceHtml = d
      ? fmt(d.price)
      : '<span style="color:var(--muted)">—</span>';
    const plHtml = `<span class="${pl >= 0 ? 'pos' : 'neg'}">${pl >= 0 ? '+' : ''}${fmt(pl)} (${plPct >= 0 ? '+' : ''}${plPct.toFixed(1)}%)</span>`;

    let pills;
    if (d) {
      pills = [['1W', d.pct_1w], ['1M', d.pct_1m], ['3M', d.pct_3m], ['1Y', d.pct_1y]]
        .map(([lbl, v]) => v == null
          ? `<span class="perf-pill na">${lbl} —</span>`
          : `<span class="perf-pill ${v >= 0 ? 'pos' : 'neg'}">${lbl} ${v >= 0 ? '+' : ''}${v}%</span>`)
        .join('');
    } else if (fetchingSyms.has(h.yf_symbol)) {
      pills = '<span class="perf-pill na">⟳ Fetching…</span>';
    } else {
      pills = '<span class="perf-pill na">— no data</span>';
    }

    const initials = h.symbol.replace(/\.(NS|BO)$/i, '').slice(0, 3);

    return `<div class="swipe-wrap" id="sw-${h.id}">
      <div class="delete-reveal" onclick="confirmDelete(${h.id},'${esc(h.symbol)}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        <span>Delete</span>
      </div>
      <div class="swipe-item holding-card" data-id="${h.id}" onclick="handleCardClick(${h.id},this)">
        <div class="hc-icon">${initials}</div>
        <div class="hc-body">
          <div class="hc-top">
            <span class="hc-symbol">${h.symbol}</span>
            <span class="hc-price" id="hcp-${h.id}">${priceHtml}</span>
          </div>
          <div class="hc-mid">
            <span class="hc-name">${h.name || ''}</span>
            <span class="hc-pl" id="hcpl-${h.id}">${plHtml}</span>
          </div>
          <div class="hc-perfs" id="hcperf-${h.id}">${pills}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateSummary();
  initSwipes();
}

// ─────────────────────────────────────────────────────────────────────────────
//  Partial card + summary update (called after each sequential fetch)
// ─────────────────────────────────────────────────────────────────────────────
function updateCard(id) {
  const h = portfolio.find(x => x.id === id);
  if (!h) return;
  const d        = liveData[h.yf_symbol];
  const invested = h.buy_price * h.qty;
  const curVal   = d ? d.price * h.qty : invested;
  const pl       = curVal - invested;
  const plPct    = invested ? pl / invested * 100 : 0;

  const priceEl = document.getElementById(`hcp-${id}`);
  const plEl    = document.getElementById(`hcpl-${id}`);
  const perfEl  = document.getElementById(`hcperf-${id}`);
  if (!priceEl) return; // card not in DOM yet

  priceEl.innerHTML = d
    ? fmt(d.price)
    : '<span style="color:var(--muted)">—</span>';

  plEl.innerHTML = `<span class="${pl >= 0 ? 'pos' : 'neg'}">${pl >= 0 ? '+' : ''}${fmt(pl)} (${plPct >= 0 ? '+' : ''}${plPct.toFixed(1)}%)</span>`;

  if (d) {
    perfEl.innerHTML = [['1W', d.pct_1w], ['1M', d.pct_1m], ['3M', d.pct_3m], ['1Y', d.pct_1y]]
      .map(([lbl, v]) => v == null
        ? `<span class="perf-pill na">${lbl} —</span>`
        : `<span class="perf-pill ${v >= 0 ? 'pos' : 'neg'}">${lbl} ${v >= 0 ? '+' : ''}${v}%</span>`)
      .join('');
  } else if (!fetchingSyms.has(h.yf_symbol)) {
    perfEl.innerHTML = '<span class="perf-pill na">— no data</span>';
  }
  // If still fetching, leave the "⟳ Fetching…" text as-is
}

function updateSummary() {
  if (portfolio.length === 0) return;
  let inv = 0, cur = 0;
  portfolio.forEach(h => {
    const d = liveData[h.yf_symbol];
    inv += h.buy_price * h.qty;
    cur += d ? d.price * h.qty : h.buy_price * h.qty;
  });
  const totalPL  = cur - inv;
  const totalRet = inv ? totalPL / inv * 100 : 0;

  document.getElementById('sumInvested').textContent = fmtC(inv);
  document.getElementById('sumCurrent').textContent  = fmtC(cur);
  const plEl = document.getElementById('sumPL');
  plEl.textContent = (totalPL >= 0 ? '+' : '') + fmtC(totalPL);
  plEl.className   = 'sum-val ' + (totalPL >= 0 ? 'pos' : 'neg');
  const retEl = document.getElementById('sumReturn');
  retEl.textContent = (totalRet >= 0 ? '+' : '') + totalRet.toFixed(1) + '%';
  retEl.className   = 'sum-val ' + (totalRet >= 0 ? 'pos' : 'neg');
}

// ─────────────────────────────────────────────────────────────────────────────
//  Swipe-to-delete
// ─────────────────────────────────────────────────────────────────────────────
let openSwipeItem = null;

function resetAllSwipes() {
  if (openSwipeItem) {
    openSwipeItem.style.transition = 'transform 0.2s ease';
    openSwipeItem.style.transform  = 'translateX(0)';
    openSwipeItem.dataset.swiped   = 'false';
    openSwipeItem = null;
  }
}

function initSwipes() {
  document.querySelectorAll('.swipe-item').forEach(item => {
    let startX = 0, startY = 0, isDragging = false, lastDx = 0;
    item.dataset.swiped = 'false';

    item.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isDragging = false; lastDx = 0;
      item.style.transition = 'none';
      // close any other open card
      if (openSwipeItem && openSwipeItem !== item) {
        openSwipeItem.style.transition = 'transform 0.2s ease';
        openSwipeItem.style.transform  = 'translateX(0)';
        openSwipeItem.dataset.swiped   = 'false';
        openSwipeItem = null;
      }
    }, { passive: true });

    item.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!isDragging && Math.abs(dy) > Math.abs(dx) + 5) return; // vertical scroll
      isDragging = true; lastDx = dx;
      const base   = item.dataset.swiped === 'true' ? -80 : 0;
      const offset = Math.min(0, Math.max(-110, base + dx));
      item.style.transform = `translateX(${offset}px)`;
    }, { passive: true });

    item.addEventListener('touchend', () => {
      if (!isDragging) return;
      item.style.transition = 'transform 0.2s ease';
      const wasOpen = item.dataset.swiped === 'true';
      if (wasOpen && lastDx > 30) {
        item.style.transform = 'translateX(0)';
        item.dataset.swiped  = 'false';
        openSwipeItem = null;
      } else if (!wasOpen && lastDx < -50) {
        item.style.transform = 'translateX(-80px)';
        item.dataset.swiped  = 'true';
        openSwipeItem = item;
      } else if (wasOpen) {
        item.style.transform = 'translateX(-80px)';
      } else {
        item.style.transform = 'translateX(0)';
      }
    }, { passive: true });
  });
}

function handleCardClick(id, el) {
  if (el.dataset.swiped === 'true') {
    el.style.transition = 'transform 0.2s ease';
    el.style.transform  = 'translateX(0)';
    el.dataset.swiped   = 'false';
    openSwipeItem = null;
    return;
  }
  openDetail(id);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Analytics Table
// ─────────────────────────────────────────────────────────────────────────────
function renderAnalytics() {
  const tbody = document.getElementById('perfTableBody');
  if (!tbody) return;

  if (portfolio.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:48px 20px">
      Add holdings to see performance analytics</td></tr>`;
    updateSortHeaders(); return;
  }

  const rows = portfolio.map(h => {
    const d = liveData[h.yf_symbol];
    const invested = h.buy_price * h.qty;
    const curVal   = d ? d.price * h.qty : null;
    const pl_pct   = curVal != null && invested ? (curVal - invested) / invested * 100 : null;
    return { h, d, invested, curVal, pl_pct };
  });

  rows.sort((a, b) => {
    if (sortCol === 'symbol') return sortDir * a.h.symbol.localeCompare(b.h.symbol);
    const INF = -Infinity;
    const av = sortCol === 'price' ? (a.d?.price ?? INF) :
               sortCol === 'value' ? (a.curVal ?? INF) :
               sortCol === 'pl_pct' ? (a.pl_pct ?? INF) : (a.d?.[sortCol] ?? INF);
    const bv = sortCol === 'price' ? (b.d?.price ?? INF) :
               sortCol === 'value' ? (b.curVal ?? INF) :
               sortCol === 'pl_pct' ? (b.pl_pct ?? INF) : (b.d?.[sortCol] ?? INF);
    return sortDir * (av - bv);
  });

  function pctCell(v) {
    if (v == null) return '<span class="pct-na">—</span>';
    const cls = v >= 0 ? 'pct-pos' : 'pct-neg';
    return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(1)}%</span>`;
  }

  tbody.innerHTML = rows.map(({ h, d, curVal, pl_pct }) => `
    <tr onclick="openDetail(${h.id})">
      <td>
        <span class="td-sym">${h.symbol}</span>
        <span class="td-name">${h.name || ''}</span>
      </td>
      <td class="price-cell">${d ? '₹' + d.price.toLocaleString('en-IN') : '<span class="pct-na">—</span>'}</td>
      <td class="val-cell">${curVal != null ? '₹' + Math.round(curVal).toLocaleString('en-IN') : '<span class="pct-na">—</span>'}</td>
      <td>${pctCell(d?.pct_1w)}</td>
      <td>${pctCell(d?.pct_1m)}</td>
      <td>${pctCell(d?.pct_3m)}</td>
      <td>${pctCell(d?.pct_1y)}</td>
      <td>${pctCell(pl_pct)}</td>
    </tr>`).join('');

  updateSortHeaders();
}

function sortTable(col) {
  sortDir = sortCol === col ? -sortDir : -1;
  sortCol = col;
  renderAnalytics();
}

function updateSortHeaders() {
  const cols = ['symbol','price','value','pct_1w','pct_1m','pct_3m','pct_1y','pl_pct'];
  document.querySelectorAll('#perfTable th').forEach((th, i) => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (cols[i] === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  Detail Sheet
// ─────────────────────────────────────────────────────────────────────────────
function openDetail(id) {
  resetAllSwipes();
  const h = portfolio.find(x => x.id === id);
  if (!h) return;
  const d        = liveData[h.yf_symbol];
  const invested = h.buy_price * h.qty;
  const curVal   = d ? d.price * h.qty : invested;
  const pl       = curVal - invested;
  const plPct    = invested ? pl / invested * 100 : 0;

  function perfRow(label, key) {
    const v   = d?.[key];
    const cls = v == null ? '' : v >= 0 ? 'pos' : 'neg';
    const txt = v == null ? '—' : (v >= 0 ? '+' : '') + v + '%';
    return `<div class="perf-cell">
      <div class="perf-cell-label">${label}</div>
      <div class="perf-cell-val ${cls}">${txt}</div>
    </div>`;
  }

  const delIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  document.getElementById('detailSheetBody').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div></div>
      <button class="sheet-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-header">
      <div class="detail-sym">${h.symbol}</div>
      <div class="detail-name">${h.name || ''} · ${EXCH_DISPLAY[h.exchange] || h.exchange || ''}</div>
      <div class="detail-price">${d ? fmtC(d.price) : '—'}</div>
      <div class="detail-pl ${pl >= 0 ? 'pos' : 'neg'}">
        ${pl >= 0 ? '+' : ''}${fmtC(pl)} (${plPct >= 0 ? '+' : ''}${plPct.toFixed(2)}%)
      </div>
    </div>
    <div class="perf-grid">
      ${perfRow('1 Week','pct_1w')}${perfRow('1 Month','pct_1m')}
      ${perfRow('3 Months','pct_3m')}${perfRow('1 Year','pct_1y')}
    </div>
    <div class="detail-meta">
      <div class="meta-row"><span class="meta-key">Quantity</span><span class="meta-val">${h.qty}</span></div>
      <div class="meta-row"><span class="meta-key">Buy Price</span><span class="meta-val">${fmtC(h.buy_price)}</span></div>
      <div class="meta-row"><span class="meta-key">Invested</span><span class="meta-val">${fmtC(invested)}</span></div>
      <div class="meta-row"><span class="meta-key">Current Value</span><span class="meta-val">${fmtC(curVal)}</span></div>
      ${h.buy_date ? `<div class="meta-row"><span class="meta-key">Buy Date</span><span class="meta-val">${h.buy_date}</span></div>` : ''}
    </div>
    <div class="detail-actions">
      <button class="btn-del" onclick="confirmDelete(${id},'${esc(h.symbol)}')">
        ${delIcon} Remove Holding
      </button>
    </div>`;
  document.getElementById('detailSheet').classList.add('open');
}

function closeDetail() { document.getElementById('detailSheet').classList.remove('open'); }

// ─────────────────────────────────────────────────────────────────────────────
//  Confirm Dialog
// ─────────────────────────────────────────────────────────────────────────────
function confirmDelete(id, sym) {
  closeDetail();
  document.getElementById('confirmTitle').textContent = `Remove ${sym}?`;
  document.getElementById('confirmMsg').textContent =
    'This holding will be permanently removed from your portfolio.';
  document.getElementById('confirmOk').onclick = () => { closeConfirm(); deleteHolding(id); };
  document.getElementById('confirmDialog').classList.add('open');
}

function closeConfirm() { document.getElementById('confirmDialog').classList.remove('open'); }

function deleteHolding(id) {
  portfolio = portfolio.filter(h => h.id !== id);
  savePortfolio();
  resetAllSwipes();
  renderPortfolio();
  renderAnalytics();
  showToast('Holding removed');
}

// ─────────────────────────────────────────────────────────────────────────────
//  CSV Export / Import
// ─────────────────────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Symbol','YF Symbol','Name','Exchange','Buy Price','Quantity','Buy Date',
                   'Current Price','Current Value','P&L','P&L %','1W %','1M %','3M %','1Y %'];
  const rows = portfolio.map(h => {
    const d   = liveData[h.yf_symbol];
    const inv = h.buy_price * h.qty;
    const cur = d ? d.price * h.qty : '';
    const pl  = cur !== '' ? cur - inv : '';
    const plp = inv && pl !== '' ? (pl / inv * 100).toFixed(2) : '';
    return [
      h.symbol, h.yf_symbol, h.name, h.exchange,
      h.buy_price, h.qty, h.buy_date,
      d?.price ?? '', cur !== '' ? cur.toFixed(2) : '',
      pl !== '' ? pl.toFixed(2) : '', plp,
      d?.pct_1w ?? '', d?.pct_1m ?? '', d?.pct_3m ?? '', d?.pct_1y ?? '',
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a   = document.createElement('a');
  a.href     = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'portfolio_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  showToast('CSV exported');
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines   = e.target.result.split('\n').filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
    let added = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/"/g, '').trim());
      const row  = {};
      headers.forEach((h, idx) => row[h] = cols[idx] || '');
      // Support Zerodha (tradingsymbol) and Groww (symbol) formats
      const sym  = (row['symbol'] || row['tradingsymbol'] || '').toUpperCase().trim();
      const bp   = parseFloat(row['buy price'] || row['buy_price'] ||
                               row['average price'] || row['average_price'] || 0);
      const qty  = parseFloat(row['quantity'] || row['qty'] || 0);
      if (!sym || !bp || !qty) continue;
      const exch    = (row['exchange'] || 'NSE').toUpperCase();
      const yf_sym  = normalizeYfSymbol(sym, exch);
      portfolio.push({
        id:        Date.now() + i,
        symbol:    sym,
        yf_symbol: yf_sym,
        name:      row['name'] || row['instrument name'] || sym,
        exchange:  exch,
        buy_price: bp,
        qty,
        buy_date:  row['buy date'] || row['buy_date'] || '',
      });
      added++;
    }
    savePortfolio();
    input.value = '';
    showToast(`Imported ${added} holding${added !== 1 ? 's' : ''}`);
    if (added > 0) refreshAll();
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtC(n) { return fmt(n); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close overlays on backdrop tap
document.getElementById('addSheet').addEventListener('click', e => {
  if (e.target === document.getElementById('addSheet')) closeAddSheet();
});
document.getElementById('detailSheet').addEventListener('click', e => {
  if (e.target === document.getElementById('detailSheet')) closeDetail();
});
document.getElementById('confirmDialog').addEventListener('click', e => {
  if (e.target === document.getElementById('confirmDialog')) closeConfirm();
});
// Close open swipe when tapping outside holding list
document.getElementById('holdingsList').addEventListener('touchstart', e => {
  if (!e.target.closest('.swipe-wrap')) resetAllSwipes();
}, { passive: true });

// ─────────────────────────────────────────────────────────────────────────────
//  Service Worker
// ─────────────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─────────────────────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────────────────────
applyTheme();
document.getElementById('buildBadge').textContent    = 'b' + APP_BUILD;
document.getElementById('versionFooter').textContent  = 'StockPulse · Build ' + APP_BUILD;
document.getElementById('versionFooter2').textContent = 'StockPulse · Build ' + APP_BUILD;

// ── Smart startup: restore cached prices instantly, then only refresh if stale ──
(function boot() {
  const cache = loadLiveCache();
  if (cache && cache.data) {
    liveData = cache.data;
    // Show cache age in topbar
    if (cache.ts) {
      const ageMs = Date.now() - cache.ts;
      const m = Math.floor(ageMs / 60000);
      document.getElementById('lastUpdate').textContent =
        m < 60 ? `${m}m ago` : `${Math.floor(m / 60)}h ago`;
    }
  }
  renderPortfolio();
  if (portfolio.length > 0 && isCacheStale()) {
    refreshAll(); // background sequential refresh — stale or first open
  }
})();

// Re-check on PWA foreground resume (e.g. user comes back after hours)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && portfolio.length > 0 && !isRefreshing && isCacheStale()) {
    refreshAll();
  }
});
